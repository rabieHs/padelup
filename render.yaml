databases:
  - name: padelup-db
    plan: free
    databaseName: padelup
    user: padelup

services:
  - type: web
    name: padelup-api
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -c 'import os; from http.server import HTTPServer, BaseHTTPRequestHandler; print(\"STARTING\", flush=True); HTTPServer((\"0.0.0.0\", int(os.environ.get(\"PORT\", 8000))), BaseHTTPRequestHandler).serve_forever()'"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: padelup-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "1"
